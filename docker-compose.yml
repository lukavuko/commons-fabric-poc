services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cfp
      POSTGRES_PASSWORD: cfp
      POSTGRES_DB: cfp_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfp -d cfp_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrator:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    ports:
      - "4001:4001"
    env_file: .env
    depends_on:
      migrator:
        condition: service_completed_successfully

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      migrator:
        condition: service_completed_successfully

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    env_file: .env
    depends_on:
      migrator:
        condition: service_completed_successfully

  executioner:
    build:
      context: .
      dockerfile: apps/executioner/Dockerfile
    env_file: .env
    depends_on:
      migrator:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - server
      - auth

volumes:
  postgres_data:
